title: local stress memory pages
group: bench-stress
steps:
- action: launch
  language: en
  options:
  - enable_javascript=1
  - memory_cache_size=4194304
  - disc_cache_size=0
- action: window-new
  tag: win1
- action: repeat
  tag: pages
  values:
  - ${NETSURF_BENCH_ROOT}/stress-deep-dom.html
  - ${NETSURF_BENCH_ROOT}/stress-wide-table.html
  - ${NETSURF_BENCH_ROOT}/stress-complex-table.html
  - ${NETSURF_BENCH_ROOT}/stress-flex.html
  - ${NETSURF_BENCH_ROOT}/stress-css-cascade.html
  - ${NETSURF_BENCH_ROOT}/stress-form-controls.html
  - ${NETSURF_BENCH_ROOT}/stress-inline-flow.html
  - ${NETSURF_BENCH_ROOT}/stress-object-media.html
  - ${NETSURF_BENCH_ROOT}/stress-special-elements.html
  - ${NETSURF_BENCH_ROOT}/stress-deep-dom.html
  - ${NETSURF_BENCH_ROOT}/stress-wide-table.html
  - ${NETSURF_BENCH_ROOT}/stress-complex-table.html
  - ${NETSURF_BENCH_ROOT}/stress-flex.html
  - ${NETSURF_BENCH_ROOT}/stress-css-cascade.html
  - ${NETSURF_BENCH_ROOT}/stress-form-controls.html
  - ${NETSURF_BENCH_ROOT}/stress-inline-flow.html
  - ${NETSURF_BENCH_ROOT}/stress-object-media.html
  - ${NETSURF_BENCH_ROOT}/stress-special-elements.html
  steps:
  - action: navigate
    window: win1
    repeaturl: pages
  - action: block
    conditions:
    - window: win1
      status: complete
  - action: plot-check
    window: win1
    area: extent
    checks:
    - text-contains: Stress Bench
- action: window-close
  window: win1
- action: quit
