title: local memory smoke pages
group: bench-smoke
steps:
- action: launch
  language: en
  options:
  - enable_javascript=0
  - memory_cache_size=1048576
  - disc_cache_size=0
- action: window-new
  tag: win1
- action: repeat
  tag: pages
  values:
  - ${SLATE_BENCH_ROOT}/smoke-basic.html
  - ${SLATE_BENCH_ROOT}/smoke-css.html
  - ${SLATE_BENCH_ROOT}/smoke-inline.html
  - ${SLATE_BENCH_ROOT}/smoke-noscript-canvas.html
  - ${SLATE_BENCH_ROOT}/smoke-interactions.html
  steps:
  - action: navigate
    window: win1
    repeaturl: pages
  - action: block
    conditions:
    - window: win1
      status: complete
  - action: plot-check
    window: win1
    checks:
    - text-contains: Smoke Bench
- action: navigate
  window: win1
  url: ${SLATE_BENCH_ROOT}/smoke-interactions.html
- action: block
  conditions:
  - window: win1
    status: complete
- action: mouse-track
  window: win1
  target:
    text: Hover target
  state: hover
- action: click
  window: win1
  target:
    text: Search term
    offset-y: 20
- action: keypress
  window: win1
  text: memory
- action: keypress
  window: win1
  key: BACKSPACE
- action: scroll
  window: win1
  x: 400
  y: 300
  dy: 720
- action: plot-check
  window: win1
  area: extent
  checks:
  - text-contains: Bottom Marker
- action: window-close
  window: win1
- action: quit
