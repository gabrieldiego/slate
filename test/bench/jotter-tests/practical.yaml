  - ${SLATE_BENCH_ROOT}/practical-search-results.html
  - ${SLATE_BENCH_ROOT}/practical-product-listing.html
  - ${SLATE_BENCH_ROOT}/practical-checkout.html
  - ${SLATE_BENCH_ROOT}/practical-submit-inputs.html
  - ${SLATE_BENCH_ROOT}/practical-profile-settings.html
  - ${SLATE_BENCH_ROOT}/practical-social-thread.html
  - ${SLATE_BENCH_ROOT}/practical-issue-tracker.html
  - ${SLATE_BENCH_ROOT}/practical-travel-booking.html
  steps:
  - action: navigate
    window: win1
    repeaturl: pages
  - action: block
