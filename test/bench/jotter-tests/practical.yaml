title: local practical browsing memory pages
group: bench-practical
steps:
- action: launch
  language: en
  options:
  - enable_javascript=1
  - memory_cache_size=4194304
  - disc_cache_size=0
- action: window-new
  tag: win1
- action: repeat
  tag: pages
  values:
  - ${SLATE_BENCH_ROOT}/practical-news.html
  - ${SLATE_BENCH_ROOT}/practical-form.html
